apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-picker
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-picker
  template:
    metadata:
      labels:
        app: inference-picker
    spec:
      serviceAccountName: inference-picker
      containers:
      - name: picker
        image: us-central1-docker.pkg.dev/k8s-staging-images/gateway-api-inference-extension/epp:main
        imagePullPolicy: Always
        args:
        - --pool-name
        - vllm-pool
        - --pool-namespace
        - gemma-server
        - --pool-group
        - inference.networking.k8s.io
        - --zap-encoder
        - json
        - --config-file
        - /config/plugins.yaml
        ports:
        - containerPort: 9002
          name: grpc
        volumeMounts:
        - name: config-volume
          mountPath: /config
      volumes:
      - name: config-volume
        configMap:
          name: inference-picker
---
apiVersion: v1
kind: Service
metadata:
  name: inference-picker
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: inference-picker
  ports:
  - port: 9002
    targetPort: 9002
