apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: vllm-pool
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: gemma-server
  endpointPickerRef:
    name: inference-picker
    kind: Service
    port:
      number: 8080
  targetPorts:
  - number: 8000
