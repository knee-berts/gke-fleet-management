
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gemma-server-route
  labels:
    gateway: gemma-server-gateway
spec:
  parentRefs:
  - kind: Gateway
    name: gemma-server-gateway
    namespace: gateway-system
  rules:
  - backendRefs:
    - group: networking.gke.io
      kind: GCPInferencePoolImport
      name: vllm-pool
      port: 8000
