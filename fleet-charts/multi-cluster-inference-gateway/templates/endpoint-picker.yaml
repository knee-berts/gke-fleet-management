apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-picker
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-picker
  template:
    metadata:
      labels:
        app: inference-picker
    spec:
      containers:
      - name: picker
        image: gcr.io/google-samples/hello-app:1.0
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: inference-picker
  namespace: default
spec:
  selector:
    app: inference-picker
  ports:
  - port: 8080
    targetPort: 8080
