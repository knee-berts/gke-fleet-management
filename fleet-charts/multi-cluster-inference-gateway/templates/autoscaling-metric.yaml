apiVersion: autoscaling.gke.io/v1beta1
kind: AutoscalingMetric
metadata:
  name: inference-autoscaling-metric
  namespace: default
spec:
  selector:
    matchLabels:
      app: inference-server
  endpoints:
  - port: 8080
    path: /metrics
    metrics:
    - name: vllm:kv_cache_usage_perc
      exportName: kv-cache
    - name: vllm:gpu_cache_usage_perc
      exportName: kv-cache-old
